---
# inventory_resolve — shared resolution of the published OpenTofu inventory.
#
# Source priority (first that resolves wins):
#   1. TOFU_INVENTORY_PATH        explicit local path / pin (tests, overrides)
#   2. published S3 artifact      homelab RustFS, credentials read natively
#                                 from OpenBao
#   3. local gitignored cache     ONLY with TOFU_INVENTORY_ALLOW_STALE=1
#
# The role ends with `tofu_data` loaded and `tofu_inventory_resolved` set.
# Repo-specific asserts and add_host group mapping stay in the consumer.

inventory_resolve_path: "{{ lookup('env', 'TOFU_INVENTORY_PATH') | default('', true) }}"
inventory_resolve_local_cache: "{{ playbook_dir }}/../inventory/tofu_inventory.json"

# Explicit object URI override
inventory_resolve_s3_uri: "{{ lookup('env', 'TOFU_INVENTORY_S3_URI') | default('', true) }}"

# Native OpenBao path for the homelab object-storage credentials. BAO_TOKEN is
# the only secret-zero; no object-store credential is exported into the shell.
inventory_resolve_openbao_addr: "{{ lookup('env', 'BAO_ADDR') | default('', true) }}"
inventory_resolve_openbao_token: "{{ lookup('env', 'BAO_TOKEN') | default('', true) }}"
inventory_resolve_openbao_mount: secret
inventory_resolve_openbao_path: platform/object-storage
inventory_resolve_openbao_validate_certs: true
inventory_resolve_onprem_default_uri: "s3://iac-inventory/ansible_inventory.json"

# Escape hatch: the local cache is a STALE-inventory footgun (wrong VMIDs/IPs),
# so it now ALWAYS requires explicit opt-in — not only when creds are present.
inventory_resolve_allow_stale: "{{ lookup('env', 'TOFU_INVENTORY_ALLOW_STALE') | default('', true) }}"

# Consumers with a DNS/static host fallback can opt out of the terminal error.
inventory_resolve_fail_when_unresolved: true

# Top-level keys the consumer requires in tofu_data (checked after load)
inventory_resolve_required_keys: []
