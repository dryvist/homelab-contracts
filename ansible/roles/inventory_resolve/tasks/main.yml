---
# Resolve the published OpenTofu inventory and load it as `tofu_data`.
# Runs on localhost, read-only, and must work under --check (the fetch pair
# really runs: check_mode: false) — see defaults/main.yml for the contract.
#
# The two facts this role exports — `tofu_inventory_resolved` and `tofu_data`
# — are the cross-repo contract (consumed verbatim by every downstream role
# that reads tofu_data.*), so they intentionally keep their historical,
# un-prefixed names; the var-naming noqa on those two tasks is deliberate.

- name: Stat the explicit TOFU_INVENTORY_PATH
  ansible.builtin.stat:
    path: "{{ inventory_resolve_path }}"
  register: inventory_resolve_explicit_stat
  when: inventory_resolve_path | length > 0

- name: Resolve inventory from the explicit path when it exists
  ansible.builtin.set_fact: # noqa: var-naming[no-role-prefix] — contract fact
    tofu_inventory_resolved: "{{ inventory_resolve_path }}"
  when:
    - inventory_resolve_path | length > 0
    - inventory_resolve_explicit_stat.stat.exists | default(false)

# --- homelab RustFS, with credentials fetched natively from OpenBao ----------
- name: Resolve the published inventory from the on-prem store
  when:
    - tofu_inventory_resolved is not defined
    - inventory_resolve_openbao_addr | length > 0
    - inventory_resolve_openbao_token | length > 0
  block:
    - name: Read RustFS credentials from OpenBao
      community.hashi_vault.vault_kv2_get:
        url: "{{ inventory_resolve_openbao_addr }}"
        token: "{{ inventory_resolve_openbao_token }}"
        engine_mount_point: "{{ inventory_resolve_openbao_mount }}"
        path: "{{ inventory_resolve_openbao_path }}"
        validate_certs: "{{ inventory_resolve_openbao_validate_certs }}"
      register: inventory_resolve_object_storage
      failed_when: false
      no_log: true

    - name: Compute the effective on-prem object URI
      ansible.builtin.set_fact:
        inventory_resolve_s3_effective: >-
          {{ inventory_resolve_s3_uri
             if inventory_resolve_s3_uri | length > 0
             else inventory_resolve_onprem_default_uri }}

    - name: Create a temp file for the on-prem inventory
      ansible.builtin.tempfile:
        state: file
        suffix: tofu_inventory.json
      register: inventory_resolve_tmp
      changed_when: false
      check_mode: false
      when:
        - inventory_resolve_object_storage.secret.S3_ENDPOINT | default('') | length > 0
        - inventory_resolve_object_storage.secret.S3_ACCESS_KEY_ID | default('') | length > 0
        - inventory_resolve_object_storage.secret.S3_SECRET_ACCESS_KEY | default('') | length > 0

    - name: Download the inventory from the on-prem store
      amazon.aws.s3_object:
        bucket: "{{ inventory_resolve_s3_effective | regex_replace('^s3://([^/]+)/.*$', '\\1') }}"
        object: "{{ inventory_resolve_s3_effective | regex_replace('^s3://[^/]+/', '') }}"
        dest: "{{ inventory_resolve_tmp.path }}"
        mode: get
        endpoint_url: "{{ inventory_resolve_object_storage.secret.S3_ENDPOINT }}"
        access_key: "{{ inventory_resolve_object_storage.secret.S3_ACCESS_KEY_ID }}"
        secret_key: "{{ inventory_resolve_object_storage.secret.S3_SECRET_ACCESS_KEY }}"
        region: "{{ inventory_resolve_object_storage.secret.S3_REGION | default('us-east-1', true) }}"
      register: inventory_resolve_s3_get
      changed_when: false
      failed_when: false
      check_mode: false
      no_log: true
      when: inventory_resolve_tmp.path is defined

    - name: Stat the downloaded inventory
      ansible.builtin.stat:
        path: "{{ inventory_resolve_tmp.path }}"
      register: inventory_resolve_s3_stat
      when: inventory_resolve_tmp.path is defined

    - name: Resolve inventory from the on-prem download when it succeeded
      ansible.builtin.set_fact: # noqa: var-naming[no-role-prefix] — contract fact
        tofu_inventory_resolved: "{{ inventory_resolve_tmp.path }}"
      when: (inventory_resolve_s3_stat.stat.size | default(0)) > 0

# --- stale-cache gate: local cache is ALWAYS explicit opt-in ----------------
- name: Stat the local inventory cache
  ansible.builtin.stat:
    path: "{{ inventory_resolve_local_cache }}"
  register: inventory_resolve_local_stat
  when: tofu_inventory_resolved is not defined

- name: Refuse the (possibly STALE) local cache without explicit opt-in
  ansible.builtin.fail:
    msg: |
      The published inventory could not be resolved and only the local cache
      remains — refusing to use it without explicit opt-in. A stale inventory
      deploys wrong VMIDs/IPs with confusing downstream failures.

      Sources tried:
        1. TOFU_INVENTORY_PATH : {{ inventory_resolve_path | default('(unset)', true) }}
        2. published artifact  : {{ inventory_resolve_s3_effective | default('(no store creds / URI)', true) }}
        3. local cache         : {{ inventory_resolve_local_cache }}

      Fix OpenBao access to
      {{ inventory_resolve_openbao_mount }}/{{ inventory_resolve_openbao_path }},
      pin TOFU_INVENTORY_PATH, or — accepting staleness — set
      TOFU_INVENTORY_ALLOW_STALE=1.
  when:
    - tofu_inventory_resolved is not defined
    - inventory_resolve_local_stat.stat.exists | default(false)
    - inventory_resolve_allow_stale | length == 0

- name: Resolve inventory from the local cache (explicitly allowed)
  ansible.builtin.set_fact: # noqa: var-naming[no-role-prefix] — contract fact
    tofu_inventory_resolved: "{{ inventory_resolve_local_cache }}"
  when:
    - tofu_inventory_resolved is not defined
    - inventory_resolve_local_stat.stat.exists | default(false)

- name: Warn that the STALE-capable local cache is in use
  ansible.builtin.debug:
    msg: >-
      WARNING: using the local inventory cache
      {{ inventory_resolve_local_cache }} (TOFU_INVENTORY_ALLOW_STALE set).
      Ensure it is current or re-run the producer Terrakube workspace.
  when: tofu_inventory_resolved | default('') == inventory_resolve_local_cache

- name: Fail when no inventory source resolves
  ansible.builtin.fail:
    msg: |
      OpenTofu inventory could not be resolved from any source:
        1. TOFU_INVENTORY_PATH : {{ inventory_resolve_path | default('(unset)', true) }}
        2. published artifact  : {{ inventory_resolve_s3_effective | default('(no store creds / URI)', true) }}
        3. local cache         : {{ inventory_resolve_local_cache }} (missing)

      Provide ONE of:
        - BAO_ADDR and BAO_TOKEN with read access to
          {{ inventory_resolve_openbao_mount }}/{{ inventory_resolve_openbao_path }}.
        - Optionally TOFU_INVENTORY_S3_URI for a non-default RustFS object.
        - TOFU_INVENTORY_PATH pointing at a local copy.
        - A successful Terrakube run so the native publish refreshes the artifact.
  when:
    - tofu_inventory_resolved is not defined
    - inventory_resolve_fail_when_unresolved | bool

- name: Load OpenTofu inventory JSON
  ansible.builtin.include_vars: # noqa: var-naming[no-role-prefix] — contract fact
    file: "{{ tofu_inventory_resolved }}"
    name: tofu_data
  when: tofu_inventory_resolved is defined

- name: Validate required top-level keys in tofu_data
  ansible.builtin.assert:
    that:
      - tofu_data is defined
      - item in tofu_data
    fail_msg: >-
      tofu_data.{{ item }} is missing from {{ tofu_inventory_resolved }} —
      re-run the producer Terrakube workspace so the inventory is republished.
  loop: "{{ inventory_resolve_required_keys }}"
  when: tofu_data is defined
