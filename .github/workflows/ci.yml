name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-schema:
    name: validate examples against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install check-jsonschema
        run: pip install 'check-jsonschema==0.37.2'
      - name: Validate ansible_inventory example against schema
        run: check-jsonschema --schemafile schemas/ansible-inventory-v1.json examples/ansible_inventory.json
      - name: Validate nautobot_export example against schema
        run: check-jsonschema --schemafile schemas/nautobot-export-v1.json examples/nautobot_export.json

  shape-snapshot-gate:
    name: enforce snapshot on shape change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Diff schemas/ against latest versions/
        run: bash .github/scripts/diff-against-latest-version.sh

  lint-shell:
    name: shellcheck bin/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: shellcheck
        run: shellcheck bin/flow-lock bin/deployment-json

  test-cli:
    name: bats CLI-contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install bats
        run: sudo apt-get update -q && sudo apt-get install -y -q bats
      - name: Run bats
        run: bats tests/flow-lock.bats

  lint-ansible-role:
    name: ansible-lint inventory_resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install ansible-lint
        run: pip install 'ansible-lint==25.*' 'ansible-core==2.18.*'
      - name: Install required collections
        run: ansible-galaxy collection install amazon.aws community.hashi_vault
      - name: Lint the shared role
        run: ansible-lint ansible/roles/inventory_resolve
