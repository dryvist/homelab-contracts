name: mermaid-render-check

on:
  pull_request:
    paths:
      - "docs/assets/**.mmd"
      - "docs/assets/**.svg"
      - ".github/scripts/render-mermaid.sh"
      - ".github/workflows/mermaid-render-check.yml"

permissions:
  contents: read

jobs:
  render-and-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Re-render every .mmd to .svg
        run: bash .github/scripts/render-mermaid.sh
      - name: Fail on uncommitted SVG changes
        run: git diff --exit-code -- 'docs/assets/*.svg'
