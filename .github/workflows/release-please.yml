name: release-please

# Inherits the org-native release-please pipeline from dryvist/.github: the
# release App token (so release PRs trigger CI), eager auto-merge, and identical
# logic across every repo. Replaces the prior standalone setup whose
# `draft: true` config produced untagged draft releases, which broke release
# anchoring ("No latest release found") and looped a new minor on every push.

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: dryvist/.github/.github/workflows/_release-please.yml@main
    secrets:
      GH_ACTION_RELEASE_PLEASE_PRIVATE_KEY: ${{ secrets.GH_ACTION_RELEASE_PLEASE_PRIVATE_KEY }}
