# Single source of truth for the dryvist homelab port constants.
#
# Ported verbatim from the pipeline_constants block in
# JacobPEvans/terraform-proxmox/locals.tf (see github.com/JacobPEvans).
#
# Consumed by:
#   - dryvist/tofu-proxmox-cluster (via Terragrunt include / yamldecode)
#   - dryvist/ansible-proxmox-cluster (via requirements.yml git source)
#   - dryvist/ansible-server-apps (via requirements.yml git source)
#
# Hard rule: no duplication of these constants anywhere else. Consumers MUST
# read from this file or fail their CI.

service_ports:
  haproxy_stats: 8404
  splunk_web: 8000
  splunk_hec: 8088
  splunk_mgmt: 8089
  cribl_edge_api: 9420
  cribl_stream_api: 9000
  apt_cacher_ng: 3142
  minio_api: 9000
  minio_console: 9001
  # OpenBao (Vault-compatible) HTTP API — default Vault port (8200/tcp).
  # New in v1.0.0 vs upstream pipeline_constants.
  openbao: 8200

syslog_ports:
  unifi: 1514
  palo_alto: 1515
  cisco_asa: 1516
  linux: 1517
  windows: 1518

netflow_ports:
  unifi: 2055

notification_ports:
  mailpit_smtp: 1025
  mailpit_web: 8025
  ntfy_http: 8080

vector_db_ports:
  qdrant_http: 6333
  qdrant_grpc: 6334
